<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flashcards" />
  <meta name="theme-color" content="#0f172a" />
  <title>Flashcards</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface-2: #fafafa;
      --text: #0f172a;
      --muted: #64748b;
      --border: #d4d4d8;
      --accent: #0f172a;
      --accent-text: #ffffff;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      --card-shadow: 0 18px 44px rgba(15, 23, 42, 0.10);
      --focus: rgba(59, 130, 246, 0.28);
      --error-bg: rgba(220, 38, 38, 0.08);
      --error-border: rgba(220, 38, 38, 0.16);
      --error-text: #b91c1c;
      --gap: 8px;
      --radius: 18px;
      --card-radius: 26px;
      --button-height: 44px;
      --controls-height: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }

    body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-width: 0;
      min-height: 0;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-right: max(8px, env(safe-area-inset-right));
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      padding-left: max(8px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto auto;
      gap: var(--gap);
      align-items: stretch;
      flex: 0 0 auto;
      min-width: 0;
    }

    button,
    select,
    .file-button {
      appearance: none;
      min-width: 0;
      min-height: var(--button-height);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      padding: 0 14px;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    button,
    .file-button {
      cursor: pointer;
    }

    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .hidden-input {
      display: none;
    }

    select {
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button:focus-visible,
    select:focus-visible,
    .file-button:focus-visible,
    .card:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .message {
      display: none;
      flex: 0 0 auto;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--muted);
      line-height: 1.35;
      box-shadow: var(--shadow);
      font-size: 0.94rem;
    }

    .message.visible {
      display: block;
    }

    .message.error {
      border-color: var(--error-border);
      background: var(--error-bg);
      color: var(--error-text);
    }

    .empty,
    .study {
      min-width: 0;
      min-height: 0;
      flex: 1 1 auto;
    }

    .empty {
      display: grid;
      place-items: center;
      border: 1px dashed var(--border);
      border-radius: var(--card-radius);
      background: rgba(255, 255, 255, 0.45);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-weight: 600;
    }

    .study {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      overflow: hidden;
    }

    .meta {
      min-width: 0;
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 2px;
      flex: 0 0 auto;
    }

    .meta-actions {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }

    .deck-name,
    .card-counter {
      min-width: 0;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .deck-name {
      color: var(--text);
      padding-right: 8px;
    }

    .mini-button {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 800;
      box-shadow: none;
      flex: 0 0 auto;
    }

    .mini-button.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .card {
      width: 100%;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      box-shadow: var(--card-shadow);
      padding: 14px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }

    .side-label {
      align-self: flex-start;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
      flex: 0 0 auto;
    }

    .card-text-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 10px 6px 2px;
      -webkit-overflow-scrolling: touch;
    }

    .card-text {
      width: min(100%, 1100px);
      margin: 0 auto;
      text-align: center;
      font-size: clamp(1.8rem, 4.4vw, 4rem);
      line-height: 1.18;
      font-weight: 500;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      min-width: 0;
      flex: 0 0 auto;
    }

    .controls button {
      min-height: var(--controls-height);
    }

    button:disabled,
    select:disabled {
      opacity: 0.55;
      cursor: default;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 540px) {
      :root {
        --gap: 6px;
        --button-height: 42px;
        --controls-height: 46px;
      }

      .app {
        padding-top: max(6px, env(safe-area-inset-top));
        padding-right: max(6px, env(safe-area-inset-right));
        padding-bottom: max(6px, env(safe-area-inset-bottom));
        padding-left: max(6px, env(safe-area-inset-left));
      }

      button,
      select,
      .file-button {
        border-radius: 12px;
        padding: 0 12px;
        font-size: 0.96rem;
      }

      .mini-button {
        min-height: 32px;
        padding: 0 10px;
        font-size: 0.8rem;
      }

      .card {
        padding: 12px;
        border-radius: 22px;
      }

      .card-text {
        font-size: clamp(1.55rem, 6.3vw, 2.8rem);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Controls">
      <label class="file-button" for="deckInput">Load</label>
      <input id="deckInput" class="hidden-input" type="file" accept=".json,application/json" multiple />

      <select id="deckSelect" aria-label="Deck selection">
        <option value="">No decks</option>
      </select>

      <button id="saveStateButton" type="button">Save</button>
      <button id="shuffleButton" type="button">Shuffle</button>
      <button id="clearButton" type="button">Clear</button>
    </section>

    <div id="message" class="message" aria-live="polite"></div>

    <section id="emptyState" class="empty">No cards loaded.</section>

    <section id="studyArea" class="study" hidden>
      <div class="meta">
        <span id="deckName" class="deck-name"></span>
        <div class="meta-actions">
          <button id="reviewToggleButton" class="mini-button" type="button" aria-pressed="false">Review</button>
          <span id="cardCounter" class="card-counter"></span>
        </div>
      </div>

      <button id="cardButton" class="card" type="button" aria-label="Flashcard">
        <div id="sideLabel" class="side-label">Front</div>
        <div class="card-text-wrap">
          <div id="cardText" class="card-text"></div>
        </div>
      </button>

      <div class="controls">
        <button id="prevButton" type="button">Prev</button>
        <button id="flipButton" class="primary" type="button">Flip</button>
        <button id="nextButton" type="button">Next</button>
      </div>
    </section>
  </main>

  <script>
    const ALL_DECKS_VALUE = '__all__';
    const REVIEW_STATE_SUFFIX = '-review-state.json';

    const state = {
      decks: [],
      sourceValue: ALL_DECKS_VALUE,
      activeCards: [],
      cardIndex: 0,
      showingFront: true,
      reviewOnly: false,
      reviewSessionKeys: null,
      touchStartX: null,
      touchStartY: null,
      suppressNextClick: false,
      suppressClickTimer: null,
      dirtySourceKeys: new Set()
    };

    const deckInput = document.getElementById('deckInput');
    const deckSelect = document.getElementById('deckSelect');
    const saveStateButton = document.getElementById('saveStateButton');
    const shuffleButton = document.getElementById('shuffleButton');
    const clearButton = document.getElementById('clearButton');
    const message = document.getElementById('message');
    const emptyState = document.getElementById('emptyState');
    const studyArea = document.getElementById('studyArea');
    const deckName = document.getElementById('deckName');
    const cardCounter = document.getElementById('cardCounter');
    const reviewToggleButton = document.getElementById('reviewToggleButton');
    const cardButton = document.getElementById('cardButton');
    const sideLabel = document.getElementById('sideLabel');
    const cardText = document.getElementById('cardText');
    const prevButton = document.getElementById('prevButton');
    const flipButton = document.getElementById('flipButton');
    const nextButton = document.getElementById('nextButton');

    function makeDeckId() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }
      return 'deck-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
    }

    function hashString(input) {
      let hash = 5381;
      for (let i = 0; i < input.length; i += 1) {
        hash = ((hash << 5) + hash) ^ input.charCodeAt(i);
      }
      return (hash >>> 0).toString(16);
    }

    function stripJsonSuffix(name) {
      return String(name || '').replace(/\.json$/i, '');
    }

    function stripReviewStateSuffix(name) {
      return String(name || '').replace(/-review-state\.json$/i, '');
    }

    function isReviewStateFilename(name) {
      return /-review-state\.json$/i.test(String(name || ''));
    }

    function getUrlBasename(urlLike) {
      try {
        const url = new URL(String(urlLike || ''), window.location.href);
        const pieces = url.pathname.split('/');
        return decodeURIComponent(pieces[pieces.length - 1] || '');
      } catch (error) {
        return String(urlLike || '');
      }
    }

    function safeTitleFromSourceLabel(label) {
      return stripJsonSuffix(getUrlBasename(label || 'Untitled Deck.json'))
        .replace(/[_-]+/g, ' ')
        .trim() || 'Untitled Deck';
    }

    function makeCardKey(front, back) {
      return hashString(front + '\u241f' + back);
    }

    function makeSourceKey(sourceType, sourceName, sourceUrl) {
      return sourceType + ':' + (sourceUrl || sourceName || makeDeckId());
    }

    function makeReviewStateFileName(sourceName) {
      const base = stripJsonSuffix(sourceName || 'deck');
      return (base || 'deck') + REVIEW_STATE_SUFFIX;
    }

    function makeReviewStateUrl(sourceUrl) {
      try {
        const url = new URL(sourceUrl, window.location.href);
        const path = url.pathname;
        url.pathname = /\.json$/i.test(path)
          ? path.replace(/\.json$/i, REVIEW_STATE_SUFFIX)
          : path + REVIEW_STATE_SUFFIX;
        return url.toString();
      } catch (error) {
        return '';
      }
    }

    function makeSourceMeta(sourceType, sourceName, sourceUrl) {
      const resolvedUrl = sourceUrl ? new URL(sourceUrl, window.location.href).toString() : '';
      const resolvedName = sourceName || getUrlBasename(resolvedUrl) || 'Untitled Deck.json';
      return {
        sourceType: sourceType,
        sourceName: resolvedName,
        sourceUrl: resolvedUrl,
        sourceKey: makeSourceKey(sourceType, resolvedName, resolvedUrl),
        reviewStateName: makeReviewStateFileName(resolvedName),
        reviewStateUrl: resolvedUrl ? makeReviewStateUrl(resolvedUrl) : ''
      };
    }

    function parseReviewStatePayload(rawPayload) {
      if (!rawPayload || typeof rawPayload !== 'object' || Array.isArray(rawPayload)) {
        return null;
      }

      if (Array.isArray(rawPayload.decks)) {
        return rawPayload;
      }

      if (Array.isArray(rawPayload.needsReviewKeys) || Array.isArray(rawPayload.flags)) {
        return {
          version: 1,
          type: 'flashcard-review-state',
          decks: [{
            title: typeof rawPayload.deckTitle === 'string' ? rawPayload.deckTitle.trim() : '',
            needsReviewKeys: Array.isArray(rawPayload.needsReviewKeys) ? rawPayload.needsReviewKeys : null,
            flags: Array.isArray(rawPayload.flags) ? rawPayload.flags : null
          }]
        };
      }

      return null;
    }

    function applyReviewEntryToDeck(deck, entry) {
      if (!deck || !entry || typeof entry !== 'object') {
        return false;
      }

      if (Array.isArray(entry.needsReviewKeys)) {
        const reviewSet = new Set(entry.needsReviewKeys.filter(function(key) {
          return typeof key === 'string' && key;
        }));

        deck.cards.forEach(function(card) {
          card.needsReview = reviewSet.has(card.cardKey);
        });
        return true;
      }

      if (Array.isArray(entry.flags)) {
        deck.cards.forEach(function(card, index) {
          card.needsReview = typeof entry.flags[index] === 'boolean' ? entry.flags[index] : false;
        });
        return true;
      }

      return false;
    }

    function applyReviewStateBundleToDecks(decks, rawPayload) {
      const payload = parseReviewStatePayload(rawPayload);
      if (!payload || !Array.isArray(decks) || !decks.length) {
        return false;
      }

      const entries = Array.isArray(payload.decks) ? payload.decks : [];
      if (!entries.length) {
        return false;
      }

      if (decks.length === 1 && entries.length === 1) {
        return applyReviewEntryToDeck(decks[0], entries[0]);
      }

      const titleMap = new Map();
      entries.forEach(function(entry) {
        if (entry && typeof entry === 'object' && typeof entry.title === 'string' && entry.title.trim()) {
          titleMap.set(entry.title.trim(), entry);
        }
      });

      let applied = false;
      decks.forEach(function(deck) {
        const entry = titleMap.get(deck.title) || null;
        if (entry) {
          applied = applyReviewEntryToDeck(deck, entry) || applied;
        }
      });

      return applied;
    }

    function buildReviewStatePayloadForSource(sourceKey) {
      const decks = state.decks.filter(function(deck) {
        return deck.sourceKey === sourceKey;
      });

      if (!decks.length) {
        return null;
      }

      return {
        version: 1,
        type: 'flashcard-review-state',
        sourceDeck: decks[0].sourceName || null,
        generatedAt: new Date().toISOString(),
        decks: decks.map(function(deck) {
          return {
            title: deck.title,
            needsReviewKeys: deck.cards.filter(function(card) {
              return Boolean(card.needsReview);
            }).map(function(card) {
              return card.cardKey;
            })
          };
        })
      };
    }

    function normalizeCard(rawCard, deckTitle) {
      if (!rawCard || typeof rawCard !== 'object' || Array.isArray(rawCard)) {
        return null;
      }

      const front = typeof rawCard.front === 'string' ? rawCard.front.trim() : '';
      const back = typeof rawCard.back === 'string' ? rawCard.back.trim() : '';

      if (!front || !back) {
        return null;
      }

      return {
        front: front,
        back: back,
        deckTitle: deckTitle,
        cardKey: makeCardKey(front, back),
        needsReview: Boolean(rawCard.needsReview)
      };
    }

    function normalizeDeck(rawDeck, fallbackTitle, sourceMeta) {
      if (!rawDeck || typeof rawDeck !== 'object' || Array.isArray(rawDeck)) {
        return null;
      }

      const title = typeof rawDeck.title === 'string' && rawDeck.title.trim()
        ? rawDeck.title.trim()
        : fallbackTitle;

      const cards = Array.isArray(rawDeck.cards)
        ? rawDeck.cards.map(function(card) {
            return normalizeCard(card, title);
          }).filter(Boolean)
        : [];

      if (!cards.length) {
        return null;
      }

      return {
        id: makeDeckId(),
        title: title,
        cards: cards,
        sourceType: sourceMeta.sourceType,
        sourceName: sourceMeta.sourceName,
        sourceUrl: sourceMeta.sourceUrl,
        sourceKey: sourceMeta.sourceKey,
        reviewStateName: sourceMeta.reviewStateName,
        reviewStateUrl: sourceMeta.reviewStateUrl
      };
    }

    function extractDecks(payload, sourceMeta) {
      const fallbackTitle = safeTitleFromSourceLabel(sourceMeta.sourceName || sourceMeta.sourceUrl);

      if (Array.isArray(payload)) {
        const looksLikeCardArray = payload.every(function(item) {
          return item && typeof item === 'object' && !Array.isArray(item) && ('front' in item || 'back' in item);
        });

        if (looksLikeCardArray) {
          const deck = normalizeDeck({ title: fallbackTitle, cards: payload }, fallbackTitle, sourceMeta);
          return deck ? [deck] : [];
        }

        return payload.map(function(item, index) {
          return normalizeDeck(item, fallbackTitle + ' ' + (index + 1), sourceMeta);
        }).filter(Boolean);
      }

      if (payload && typeof payload === 'object') {
        if (Array.isArray(payload.decks)) {
          return payload.decks.map(function(item, index) {
            return normalizeDeck(item, fallbackTitle + ' ' + (index + 1), sourceMeta);
          }).filter(Boolean);
        }

        const deck = normalizeDeck(payload, fallbackTitle, sourceMeta);
        return deck ? [deck] : [];
      }

      return [];
    }

    function readFileAsText(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function(event) {
          resolve(String(event.target && event.target.result ? event.target.result : ''));
        };
        reader.onerror = function() {
          reject(new Error('Could not read ' + file.name));
        };
        reader.readAsText(file);
      });
    }

    function shuffleArray(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }
      return copy;
    }

    function setMessage(text, isError) {
      const hasText = typeof text === 'string' && text.trim();
      message.textContent = hasText ? text.trim() : '';
      message.classList.toggle('visible', Boolean(hasText));
      message.classList.toggle('error', Boolean(hasText && isError));
    }

    function totalCardCount() {
      return state.decks.reduce(function(total, deck) {
        return total + deck.cards.length;
      }, 0);
    }

    function rebuildDeckSelect() {
      const previousValue = state.sourceValue;
      deckSelect.innerHTML = '';

      if (!state.decks.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No decks';
        deckSelect.appendChild(option);
        state.sourceValue = ALL_DECKS_VALUE;
        deckSelect.value = '';
        return;
      }

      if (state.decks.length > 1) {
        const allOption = document.createElement('option');
        allOption.value = ALL_DECKS_VALUE;
        allOption.textContent = 'All decks (' + totalCardCount() + ')';
        deckSelect.appendChild(allOption);
      }

      state.decks.forEach(function(deck) {
        const option = document.createElement('option');
        option.value = deck.id;
        option.textContent = deck.title + ' (' + deck.cards.length + ')';
        deckSelect.appendChild(option);
      });

      const valueStillExists = state.decks.some(function(deck) {
        return deck.id === previousValue;
      });

      if (previousValue === ALL_DECKS_VALUE && state.decks.length > 1) {
        state.sourceValue = ALL_DECKS_VALUE;
      } else if (valueStillExists) {
        state.sourceValue = previousValue;
      } else {
        state.sourceValue = state.decks.length > 1 ? ALL_DECKS_VALUE : state.decks[0].id;
      }

      deckSelect.value = state.sourceValue;
    }

    function selectedDecks() {
      if (state.sourceValue === ALL_DECKS_VALUE) {
        return state.decks.slice();
      }
      return state.decks.filter(function(deck) {
        return deck.id === state.sourceValue;
      });
    }

    function hasAnyReviewCards(decks) {
      return decks.some(function(deck) {
        return deck.cards.some(function(card) {
          return Boolean(card.needsReview);
        });
      });
    }

    function makeReviewSessionKey(deck, card) {
      return deck.id + '\u241f' + card.cardKey;
    }

    function captureReviewSessionKeys(decks) {
      const keys = new Set();
      decks.forEach(function(deck) {
        deck.cards.forEach(function(card) {
          if (card.needsReview) {
            keys.add(makeReviewSessionKey(deck, card));
          }
        });
      });
      return keys;
    }

    function chooseStudyModeForCurrentSelection() {
      const decks = selectedDecks();
      state.reviewSessionKeys = null;

      if (!decks.length || !hasAnyReviewCards(decks)) {
        state.reviewOnly = false;
        return;
      }

      state.reviewOnly = window.confirm('Study only cards marked for review?\n\nOK = only review cards\nCancel = all cards');
      if (state.reviewOnly) {
        state.reviewSessionKeys = captureReviewSessionKeys(decks);
      }
    }

    function rebuildActiveCards(shouldShuffle) {
      const cards = [];
      selectedDecks().forEach(function(deck) {
        deck.cards.forEach(function(card) {
          const includeCard = !state.reviewOnly
            || !state.reviewSessionKeys
            || state.reviewSessionKeys.has(makeReviewSessionKey(deck, card));

          if (includeCard) {
            cards.push({
              deckId: deck.id,
              deckTitle: deck.title,
              sourceKey: deck.sourceKey,
              card: card
            });
          }
        });
      });

      state.activeCards = shouldShuffle ? shuffleArray(cards) : cards;
      state.cardIndex = 0;
      state.showingFront = true;
    }

    function currentCard() {
      return state.activeCards.length ? state.activeCards[state.cardIndex] : null;
    }

    function currentDeckLabel(cardItem) {
      if (!cardItem) {
        return '';
      }

      if (state.sourceValue === ALL_DECKS_VALUE && state.decks.length > 1) {
        return cardItem.deckTitle;
      }

      const decks = selectedDecks();
      return decks.length ? decks[0].title : cardItem.deckTitle;
    }

    function suppressGhostClick() {
      state.suppressNextClick = true;
      if (state.suppressClickTimer) {
        window.clearTimeout(state.suppressClickTimer);
      }
      state.suppressClickTimer = window.setTimeout(function() {
        state.suppressNextClick = false;
        state.suppressClickTimer = null;
      }, 450);
    }

    function updateEmptyStateText() {
      if (!state.decks.length) {
        emptyState.textContent = 'No cards loaded.';
        return;
      }

      if (state.reviewOnly) {
        emptyState.textContent = 'No cards marked for review.';
        return;
      }

      emptyState.textContent = 'No cards available.';
    }

    function uniqueSourceKeysFromDecks(decks) {
      return Array.from(new Set(decks.map(function(deck) {
        return deck.sourceKey;
      }).filter(Boolean)));
    }

    function saveableSourceKeysForCurrentSelection() {
      return uniqueSourceKeysFromDecks(selectedDecks());
    }

    function currentSelectionHasDirtyState() {
      return saveableSourceKeysForCurrentSelection().some(function(sourceKey) {
        return state.dirtySourceKeys.has(sourceKey);
      });
    }

    function render() {
      const hasCards = state.activeCards.length > 0;
      const cardItem = currentCard();
      const hasDecks = state.decks.length > 0;
      const saveableSourceKeys = saveableSourceKeysForCurrentSelection();
      const canSave = hasDecks && saveableSourceKeys.length === 1;

      updateEmptyStateText();
      emptyState.hidden = hasCards;
      studyArea.hidden = !hasCards;

      deckSelect.disabled = !hasDecks;
      saveStateButton.disabled = !canSave;
      saveStateButton.classList.toggle('primary', canSave && currentSelectionHasDirtyState());
      shuffleButton.disabled = !hasCards;
      clearButton.disabled = !hasDecks;
      prevButton.disabled = !hasCards;
      flipButton.disabled = !hasCards;
      nextButton.disabled = !hasCards;
      cardButton.disabled = !hasCards;
      reviewToggleButton.disabled = !hasCards;

      if (!hasCards || !cardItem) {
        deckName.textContent = '';
        cardCounter.textContent = '';
        sideLabel.textContent = 'Front';
        cardText.textContent = '';
        reviewToggleButton.textContent = 'Review';
        reviewToggleButton.classList.remove('primary');
        reviewToggleButton.classList.remove('active');
        reviewToggleButton.setAttribute('aria-pressed', 'false');
        return;
      }

      deckName.textContent = currentDeckLabel(cardItem);
      cardCounter.textContent = (state.cardIndex + 1) + ' / ' + state.activeCards.length;
      sideLabel.textContent = state.showingFront ? 'Front' : 'Back';
      if (cardItem.card.needsReview) {
        sideLabel.textContent += ' - Review';
      }
      cardText.textContent = state.showingFront ? cardItem.card.front : cardItem.card.back;
      reviewToggleButton.textContent = 'Review';
      reviewToggleButton.classList.toggle('primary', Boolean(cardItem.card.needsReview));
      reviewToggleButton.classList.toggle('active', Boolean(cardItem.card.needsReview));
      reviewToggleButton.setAttribute('aria-pressed', cardItem.card.needsReview ? 'true' : 'false');
    }

    function changeCard(delta) {
      if (!state.activeCards.length) {
        return;
      }

      const total = state.activeCards.length;
      state.cardIndex = (state.cardIndex + delta + total) % total;
      state.showingFront = true;
      render();
    }

    function flipCard() {
      if (!currentCard()) {
        return;
      }

      state.showingFront = !state.showingFront;
      render();
    }

    function toggleCurrentReview() {
      const cardItem = currentCard();
      if (!cardItem) {
        return;
      }

      cardItem.card.needsReview = !cardItem.card.needsReview;
      state.dirtySourceKeys.add(cardItem.sourceKey);
      render();
    }

    function clearDecks() {
      state.decks = [];
      state.sourceValue = ALL_DECKS_VALUE;
      state.activeCards = [];
      state.cardIndex = 0;
      state.showingFront = true;
      state.reviewOnly = false;
      state.reviewSessionKeys = null;
      state.dirtySourceKeys.clear();
      deckInput.value = '';
      rebuildDeckSelect();
      setMessage('');
      render();
    }

    function downloadJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2) + '\n'], { type: 'application/json' });
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(function() {
        window.URL.revokeObjectURL(url);
      }, 1000);
    }

    function saveCurrentReviewState() {
      const sourceKeys = saveableSourceKeysForCurrentSelection();
      if (sourceKeys.length !== 1) {
        setMessage('Select a single deck before saving review state.', true);
        return;
      }

      const sourceKey = sourceKeys[0];
      const sourceDecks = state.decks.filter(function(deck) {
        return deck.sourceKey === sourceKey;
      });

      if (!sourceDecks.length) {
        setMessage('No deck available to save.', true);
        return;
      }

      const payload = buildReviewStatePayloadForSource(sourceKey);
      if (!payload) {
        setMessage('Could not build review state.', true);
        return;
      }

      const filename = sourceDecks[0].reviewStateName || makeReviewStateFileName(sourceDecks[0].sourceName);
      downloadJson(filename, payload);
      state.dirtySourceKeys.delete(sourceKey);
      setMessage('Saved ' + filename + '.', false);
      render();
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) {
        const error = new Error('HTTP ' + response.status);
        error.status = response.status;
        throw error;
      }
      return response.json();
    }

    function mergeLoadedDecks(addedDecks) {
      if (!addedDecks.length) {
        return;
      }

      state.decks = state.decks.concat(addedDecks);
      state.sourceValue = state.decks.length > 1 ? ALL_DECKS_VALUE : state.decks[0].id;
      rebuildDeckSelect();
      chooseStudyModeForCurrentSelection();
      rebuildActiveCards(false);
      render();
    }

    async function loadDeckFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) {
        return;
      }

      const parsedDeckFiles = [];
      const reviewStateMap = new Map();
      const addedDecks = [];
      const errors = [];
      let appliedExistingState = false;

      for (const file of files) {
        try {
          const text = await readFileAsText(file);
          const parsed = JSON.parse(text);

          if (isReviewStateFilename(file.name)) {
            const reviewState = parseReviewStatePayload(parsed);
            if (!reviewState) {
              errors.push(file.name + ': invalid review state file');
              continue;
            }
            reviewStateMap.set(stripReviewStateSuffix(file.name), reviewState);
            continue;
          }

          parsedDeckFiles.push({
            file: file,
            parsed: parsed
          });
        } catch (error) {
          errors.push(file.name + ': ' + (error && error.message ? error.message : 'Invalid JSON'));
        }
      }

      parsedDeckFiles.forEach(function(entry) {
        const sourceMeta = makeSourceMeta('local', entry.file.name, '');
        const decks = extractDecks(entry.parsed, sourceMeta);

        if (!decks.length) {
          errors.push(entry.file.name + ': no valid cards found');
          return;
        }

        const pairedState = reviewStateMap.get(stripJsonSuffix(entry.file.name));
        if (pairedState) {
          applyReviewStateBundleToDecks(decks, pairedState);
          reviewStateMap.delete(stripJsonSuffix(entry.file.name));
        }

        addedDecks.push.apply(addedDecks, decks);
      });

      reviewStateMap.forEach(function(reviewState, baseName) {
        const matchingDecks = state.decks.filter(function(deck) {
          return stripJsonSuffix(deck.sourceName) === baseName;
        });

        if (!matchingDecks.length) {
          errors.push(baseName + REVIEW_STATE_SUFFIX + ': no matching deck file selected');
          return;
        }

        if (applyReviewStateBundleToDecks(matchingDecks, reviewState)) {
          matchingDecks.forEach(function(deck) {
            state.dirtySourceKeys.delete(deck.sourceKey);
          });
          appliedExistingState = true;
        }
      });

      if (addedDecks.length) {
        mergeLoadedDecks(addedDecks);
      } else if (appliedExistingState) {
        chooseStudyModeForCurrentSelection();
        rebuildActiveCards(false);
        render();
      }

      if (errors.length) {
        setMessage(errors.join(' · '), true);
      } else if (addedDecks.length || appliedExistingState) {
        setMessage('', false);
      }

      deckInput.value = '';
    }

    function getDeckUrlsFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const values = params.getAll('deck');
      const urls = [];

      values.forEach(function(value) {
        String(value || '').split(',').forEach(function(part) {
          const trimmed = part.trim();
          if (trimmed) {
            urls.push(trimmed);
          }
        });
      });

      return urls;
    }

    async function loadHostedDecksFromQuery() {
      const deckUrls = getDeckUrlsFromQuery();
      if (!deckUrls.length) {
        return;
      }

      const addedDecks = [];
      const errors = [];

      for (const rawUrl of deckUrls) {
        let sourceMeta = null;
        try {
          const resolvedUrl = new URL(rawUrl, window.location.href).toString();
          sourceMeta = makeSourceMeta('remote', getUrlBasename(resolvedUrl), resolvedUrl);
          const payload = await fetchJson(sourceMeta.sourceUrl);
          const decks = extractDecks(payload, sourceMeta);

          if (!decks.length) {
            errors.push(sourceMeta.sourceName + ': no valid cards found');
            continue;
          }

          if (sourceMeta.reviewStateUrl) {
            try {
              const reviewPayload = await fetchJson(sourceMeta.reviewStateUrl);
              applyReviewStateBundleToDecks(decks, reviewPayload);
            } catch (error) {
              if (!error || error.status !== 404) {
                errors.push(sourceMeta.reviewStateName + ': ' + (error && error.message ? error.message : 'Could not load review state'));
              }
            }
          }

          addedDecks.push.apply(addedDecks, decks);
        } catch (error) {
          const label = sourceMeta ? sourceMeta.sourceName : rawUrl;
          errors.push(label + ': ' + (error && error.message ? error.message : 'Could not load deck'));
        }
      }

      if (addedDecks.length) {
        mergeLoadedDecks(addedDecks);
      }

      if (errors.length) {
        setMessage(errors.join(' · '), true);
      }
    }

    deckInput.addEventListener('change', function(event) {
      loadDeckFiles(event.target.files);
    });

    deckSelect.addEventListener('change', function(event) {
      state.sourceValue = event.target.value || ALL_DECKS_VALUE;
      chooseStudyModeForCurrentSelection();
      rebuildActiveCards(false);
      render();
    });

    saveStateButton.addEventListener('click', function() {
      saveCurrentReviewState();
    });

    shuffleButton.addEventListener('click', function() {
      rebuildActiveCards(true);
      render();
    });

    clearButton.addEventListener('click', clearDecks);
    prevButton.addEventListener('click', function() { changeCard(-1); });
    nextButton.addEventListener('click', function() { changeCard(1); });
    flipButton.addEventListener('click', flipCard);
    reviewToggleButton.addEventListener('click', function() {
      toggleCurrentReview();
    });

    cardButton.addEventListener('click', function() {
      if (state.suppressNextClick) {
        state.suppressNextClick = false;
        if (state.suppressClickTimer) {
          window.clearTimeout(state.suppressClickTimer);
          state.suppressClickTimer = null;
        }
        return;
      }
      flipCard();
    });

    cardButton.addEventListener('touchstart', function(event) {
      if (!currentCard()) {
        return;
      }
      const touch = event.changedTouches[0];
      state.touchStartX = touch.clientX;
      state.touchStartY = touch.clientY;
    }, { passive: true });

    cardButton.addEventListener('touchend', function(event) {
      if (state.touchStartX === null || state.touchStartY === null) {
        return;
      }

      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - state.touchStartX;
      const deltaY = touch.clientY - state.touchStartY;
      state.touchStartX = null;
      state.touchStartY = null;

      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);
      const isSwipe = absX >= 50 && absX >= absY * 1.2;
      const isTap = absX <= 12 && absY <= 12;

      if (isSwipe) {
        suppressGhostClick();
        if (deltaX < 0) {
          changeCard(1);
        } else {
          changeCard(-1);
        }
        return;
      }

      if (isTap) {
        suppressGhostClick();
        flipCard();
      }
    }, { passive: true });

    cardButton.addEventListener('touchcancel', function() {
      state.touchStartX = null;
      state.touchStartY = null;
      state.suppressNextClick = false;
      if (state.suppressClickTimer) {
        window.clearTimeout(state.suppressClickTimer);
        state.suppressClickTimer = null;
      }
    }, { passive: true });

    document.addEventListener('keydown', function(event) {
      if (!currentCard()) {
        return;
      }

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        changeCard(-1);
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        changeCard(1);
      } else if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        flipCard();
      } else if (event.key === 'r' || event.key === 'R') {
        event.preventDefault();
        toggleCurrentReview();
      } else if (event.key === 's' || event.key === 'S') {
        event.preventDefault();
        saveCurrentReviewState();
      }
    });

    rebuildDeckSelect();
    render();
    loadHostedDecksFromQuery();
  </script>
</body>
</html>
