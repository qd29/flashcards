<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flashcards" />
  <meta name="theme-color" content="#0f172a" />
  <title>Flashcards - Read Only</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface-2: #fafafa;
      --text: #0f172a;
      --muted: #64748b;
      --border: #d4d4d8;
      --accent: #0f172a;
      --accent-text: #ffffff;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      --card-shadow: 0 18px 44px rgba(15, 23, 42, 0.10);
      --focus: rgba(59, 130, 246, 0.28);
      --success-bg: rgba(22, 163, 74, 0.12);
      --success-border: rgba(22, 163, 74, 0.22);
      --warning-bg: rgba(245, 158, 11, 0.12);
      --warning-border: rgba(245, 158, 11, 0.20);
      --warning-text: #92400e;
      --error-bg: rgba(220, 38, 38, 0.08);
      --error-border: rgba(220, 38, 38, 0.16);
      --error-text: #b91c1c;
      --gap: 10px;
      --card-radius: 26px;
      --button-height: 46px;
      --controls-height: 48px;
      --backdrop: rgba(15, 23, 42, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }

    body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    button,
    input {
      font: inherit;
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
    }

    button {
      min-height: var(--button-height);
      min-width: 0;
      padding: 0 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
      cursor: pointer;
      touch-action: manipulation;
    }

    input {
      min-height: var(--button-height);
      min-width: 0;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.94);
    }

    button:focus-visible,
    input:focus-visible,
    .card:focus-visible,
    .status-button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    button:disabled,
    input:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }

    .success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: #166534;
      box-shadow: none;
    }

    .warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning-text);
      box-shadow: none;
    }

    .error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
      box-shadow: none;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-width: 0;
      min-height: 0;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-right: max(10px, env(safe-area-inset-right));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--gap);
      align-items: stretch;
      flex: 0 0 auto;
      min-width: 0;
    }

    .status-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--button-height);
      min-width: 0;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .page {
      min-width: 0;
      min-height: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .home-page,
    .study-page {
      min-width: 0;
      min-height: 0;
      flex: 1 1 auto;
    }

    .home-page {
      display: grid;
      place-items: center;
    }

    .home-actions {
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .launch-button {
      min-height: 92px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      border-radius: 22px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      box-shadow: var(--shadow);
      text-align: left;
    }

    .launch-button span {
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .launch-button small {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 700;
    }

    .study-page {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      overflow: hidden;
    }

    .meta,
    .meta-secondary {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 2px;
      flex: 0 0 auto;
    }

    .meta span,
    .meta-secondary span {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 800;
    }

    .meta .title {
      color: var(--text);
      font-size: 1rem;
    }

    .meta .counter,
    .meta-secondary span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .card {
      width: 100%;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      box-shadow: var(--card-shadow);
      padding: 14px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .side-label,
    .mode-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: none;
    }

    .card-text-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 10px 6px 2px;
      -webkit-overflow-scrolling: touch;
    }

    .card-text {
      width: min(100%, 1100px);
      margin: 0 auto;
      text-align: center;
      font-size: clamp(1.65rem, 4.3vw, 3.8rem);
      line-height: 1.18;
      font-weight: 500;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      min-width: 0;
      flex: 0 0 auto;
    }

    .controls button {
      min-height: var(--controls-height);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--backdrop);
      z-index: 1000;
    }

    .modal-backdrop.visible {
      display: flex;
    }

    .modal-card {
      width: min(100%, 460px);
      max-height: min(85dvh, 760px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 28px 56px rgba(15, 23, 42, 0.18);
    }

    .modal-card h2,
    .modal-card p {
      margin: 0;
    }

    .modal-card h2 {
      font-size: 1.04rem;
      font-weight: 800;
    }

    .modal-subtle {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.4;
    }

    .modal-error {
      display: none;
      padding: 10px 12px;
      border: 1px solid var(--error-border);
      border-radius: 14px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 0.94rem;
      line-height: 1.35;
    }

    .modal-error.visible {
      display: block;
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: var(--button-height);
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .checkbox-row input,
    .deck-item input {
      min-height: auto;
      min-width: auto;
      padding: 0;
      box-shadow: none;
      appearance: auto;
      -webkit-appearance: checkbox;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      border: 0;
      background: transparent;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .deck-list {
      min-height: 0;
      max-height: min(46dvh, 360px);
      overflow: auto;
      display: grid;
      gap: 8px;
      padding-right: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .deck-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
    }

    .deck-item span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .deck-item small {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 640px) {
      :root {
        --gap: 8px;
        --button-height: 42px;
        --controls-height: 46px;
      }

      .app {
        padding-top: max(8px, env(safe-area-inset-top));
        padding-right: max(8px, env(safe-area-inset-right));
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        padding-left: max(8px, env(safe-area-inset-left));
      }

      .launch-button {
        min-height: 84px;
        border-radius: 20px;
      }

      .meta,
      .meta-secondary {
        flex-wrap: wrap;
      }

      .card {
        padding: 12px;
        border-radius: 22px;
      }

      .card-text {
        font-size: clamp(1.45rem, 6.1vw, 2.6rem);
      }
    }
  </style>

<body>
  <main class="app">
    <section class="topbar" aria-label="App controls">
      <button id="statusButton" class="status-button" type="button">Not connected</button>
      <button id="homeButton" type="button">Home</button>
    </section>

    <section class="page">
      <section id="homePage" class="home-page">
        <div class="home-actions" aria-label="Study actions">
          <button id="studyDeckButton" class="launch-button" type="button">
            <span>Study Deck</span>
            <small id="deckButtonSubtext">0 decks</small>
          </button>
        </div>
      </section>

      <section id="studyPage" class="study-page" hidden>
        <div class="meta">
          <span id="sessionTitle" class="title"></span>
          <span id="sessionCounter" class="counter"></span>
        </div>
        <div class="meta-secondary">
          <span id="cardDeckName"></span>
          <span id="cardSessionInfo">Shuffled session</span>
        </div>

        <button id="cardButton" class="card" type="button" aria-label="Flashcard">
          <div class="card-head">
            <div id="sideLabel" class="side-label">Front</div>
            <div class="mode-pill">Read only</div>
          </div>
          <div class="card-text-wrap">
            <div id="cardText" class="card-text"></div>
          </div>
        </button>

        <div class="controls">
          <button id="prevButton" type="button">Prev</button>
          <button id="flipButton" class="primary" type="button">Flip</button>
          <button id="nextButton" type="button">Next</button>
        </div>
      </section>
    </section>

    <div id="authModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <h2 id="authTitle">Enter GitHub read-only PAT</h2>
        <p class="modal-subtle">Use a token that can read this repo. This version does not write review state.</p>
        <div id="authError" class="modal-error"></div>
        <input id="patInput" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="GitHub personal access token" />
        <label class="checkbox-row" for="rememberPatCheck">
          <input id="rememberPatCheck" type="checkbox" />
          Remember PAT on this device
        </label>
        <div class="modal-actions">
          <button id="authCancelButton" type="button">Cancel</button>
          <button id="connectButton" class="primary" type="button">Connect</button>
        </div>
      </div>
    </div>

    <div id="deckModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deckTitle">
        <h2 id="deckTitle">Choose Decks</h2>
        <p id="deckSummary" class="modal-subtle">Select one or more decks. Sessions start shuffled.</p>
        <div id="deckError" class="modal-error"></div>
        <div id="deckList" class="deck-list"></div>
        <div class="modal-actions">
          <button id="deckCancelButton" type="button">Cancel</button>
          <button id="deckStartButton" class="primary" type="button">Start</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function() {
      'use strict';

      const CONFIG = {
        owner: 'qd29',
        repo: 'flashcard-bank',
        branch: 'main',
        decksRoot: 'decks',
        rememberPatKey: 'flashcard-bank.readonly.pat',
        rememberFlagKey: 'flashcard-bank.readonly.rememberPat'
      };

      const state = {
        pat: '',
        connected: false,
        decks: [],
        activePage: 'home',
        touchStartX: null,
        touchStartY: null,
        suppressNextClick: false,
        suppressClickTimer: null,
        study: {
          title: '',
          sessionCards: [],
          index: 0,
          showingFront: true
        }
      };

      const statusButton = document.getElementById('statusButton');
      const homeButton = document.getElementById('homeButton');
      const homePage = document.getElementById('homePage');
      const studyPage = document.getElementById('studyPage');
      const studyDeckButton = document.getElementById('studyDeckButton');
      const deckButtonSubtext = document.getElementById('deckButtonSubtext');
      const sessionTitle = document.getElementById('sessionTitle');
      const sessionCounter = document.getElementById('sessionCounter');
      const cardDeckName = document.getElementById('cardDeckName');
      const cardButton = document.getElementById('cardButton');
      const sideLabel = document.getElementById('sideLabel');
      const cardText = document.getElementById('cardText');
      const prevButton = document.getElementById('prevButton');
      const flipButton = document.getElementById('flipButton');
      const nextButton = document.getElementById('nextButton');
      const authModal = document.getElementById('authModal');
      const patInput = document.getElementById('patInput');
      const rememberPatCheck = document.getElementById('rememberPatCheck');
      const authError = document.getElementById('authError');
      const authCancelButton = document.getElementById('authCancelButton');
      const connectButton = document.getElementById('connectButton');
      const deckModal = document.getElementById('deckModal');
      const deckSummary = document.getElementById('deckSummary');
      const deckError = document.getElementById('deckError');
      const deckList = document.getElementById('deckList');
      const deckCancelButton = document.getElementById('deckCancelButton');
      const deckStartButton = document.getElementById('deckStartButton');

      function base64ToString(base64Text) {
        const clean = String(base64Text || '').replace(/\n/g, '');
        const binary = window.atob(clean);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder().decode(bytes);
      }

      function encodeRepoPath(path) {
        return String(path || '').split('/').filter(Boolean).map(encodeURIComponent).join('/');
      }

      function loadPreferences() {
        rememberPatCheck.checked = localStorage.getItem(CONFIG.rememberFlagKey) === '1';
        if (rememberPatCheck.checked) {
          patInput.value = localStorage.getItem(CONFIG.rememberPatKey) || '';
        }
      }

      function persistPatPreference() {
        localStorage.setItem(CONFIG.rememberFlagKey, rememberPatCheck.checked ? '1' : '0');
        if (rememberPatCheck.checked) {
          localStorage.setItem(CONFIG.rememberPatKey, patInput.value);
        } else {
          localStorage.removeItem(CONFIG.rememberPatKey);
        }
      }

      function setAuthError(text) {
        const hasText = typeof text === 'string' && text.trim();
        authError.textContent = hasText ? text.trim() : '';
        authError.classList.toggle('visible', Boolean(hasText));
      }

      function setDeckError(text) {
        const hasText = typeof text === 'string' && text.trim();
        deckError.textContent = hasText ? text.trim() : '';
        deckError.classList.toggle('visible', Boolean(hasText));
      }

      function setStatus(text, variant) {
        statusButton.textContent = text;
        statusButton.classList.remove('success', 'warning', 'error');
        if (variant === 'success') {
          statusButton.classList.add('success');
        } else if (variant === 'warning') {
          statusButton.classList.add('warning');
        } else if (variant === 'error') {
          statusButton.classList.add('error');
        }
      }

      function setUiEnabled(enabled) {
        studyDeckButton.disabled = !state.connected || !state.decks.length || !enabled;
      }

      function switchPage(name) {
        state.activePage = name;
        homePage.hidden = name !== 'home';
        studyPage.hidden = name !== 'study';
      }

      function openAuthModal(errorText) {
        setAuthError(errorText || '');
        authModal.classList.add('visible');
        authModal.setAttribute('aria-hidden', 'false');
        authCancelButton.hidden = !state.connected;
        window.requestAnimationFrame(function() {
          patInput.focus();
          patInput.setSelectionRange(patInput.value.length, patInput.value.length);
        });
      }

      function closeAuthModal() {
        if (!state.connected) {
          return;
        }
        authModal.classList.remove('visible');
        authModal.setAttribute('aria-hidden', 'true');
        setAuthError('');
      }

      function openDeckModal() {
        if (!state.connected) {
          openAuthModal('Login required.');
          return;
        }
        setDeckError('');
        deckList.innerHTML = '';

        const sortedDecks = state.decks.slice().sort(function(a, b) {
          return a.title.localeCompare(b.title) || a.path.localeCompare(b.path);
        });

        sortedDecks.forEach(function(deck, index) {
          const label = document.createElement('label');
          label.className = 'deck-item';

          const input = document.createElement('input');
          input.type = 'checkbox';
          input.value = deck.path;
          if (sortedDecks.length === 1 || index === 0) {
            input.checked = true;
          }

          const name = document.createElement('span');
          name.textContent = deck.title;

          const count = document.createElement('small');
          count.textContent = deck.cards.length + (deck.cards.length === 1 ? ' card' : ' cards');

          label.appendChild(input);
          label.appendChild(name);
          label.appendChild(count);
          deckList.appendChild(label);
        });

        deckSummary.textContent = 'Select one or more decks. Sessions start shuffled.';
        deckModal.classList.add('visible');
        deckModal.setAttribute('aria-hidden', 'false');
      }

      function closeDeckModal() {
        deckModal.classList.remove('visible');
        deckModal.setAttribute('aria-hidden', 'true');
        setDeckError('');
      }

      async function githubRequest(endpoint) {
        if (!state.pat) {
          throw new Error('GitHub PAT is required.');
        }

        const response = await fetch(
          'https://api.github.com/repos/' + encodeURIComponent(CONFIG.owner) + '/' + encodeURIComponent(CONFIG.repo) + endpoint,
          {
            method: 'GET',
            cache: 'no-store',
            headers: {
              'Accept': 'application/vnd.github+json',
              'Authorization': 'Bearer ' + state.pat,
              'X-GitHub-Api-Version': '2022-11-28'
            }
          }
        );

        const contentType = response.headers.get('content-type') || '';
        let payload = null;
        if (contentType.indexOf('application/json') >= 0) {
          payload = await response.json();
        } else {
          payload = await response.text();
        }

        if (!response.ok) {
          const error = new Error(typeof payload === 'object' && payload && payload.message ? payload.message : 'GitHub request failed.');
          error.status = response.status;
          throw error;
        }

        return payload;
      }

      async function getContents(path) {
        return githubRequest('/contents/' + encodeRepoPath(path) + '?ref=' + encodeURIComponent(CONFIG.branch));
      }

      async function getJsonFile(path) {
        const payload = await getContents(path);
        if (Array.isArray(payload)) {
          throw new Error(path + ' is a directory, not a file.');
        }
        return JSON.parse(base64ToString(payload.content || ''));
      }

      function fileBaseName(path) {
        const parts = String(path || '').split('/');
        return parts[parts.length - 1].replace(/\.json$/i, '');
      }

      function isValidCardId(id) {
        return /^[A-Za-z0-9]{15}$/.test(String(id || ''));
      }

      function normalizeDeckPayload(path, payload) {
        const fallbackTitle = fileBaseName(path).replace(/[_-]+/g, ' ');
        const rawCards = Array.isArray(payload)
          ? payload
          : payload && typeof payload === 'object' && Array.isArray(payload.cards)
            ? payload.cards
            : [];

        const title = payload && typeof payload === 'object' && !Array.isArray(payload) && typeof payload.title === 'string' && payload.title.trim()
          ? payload.title.trim()
          : fallbackTitle || path;

        const cards = [];
        rawCards.forEach(function(rawCard) {
          if (!rawCard || typeof rawCard !== 'object' || Array.isArray(rawCard)) {
            return;
          }
          const id = typeof rawCard.id === 'string' ? rawCard.id.trim() : '';
          const front = typeof rawCard.front === 'string' ? rawCard.front.trim() : '';
          const back = typeof rawCard.back === 'string' ? rawCard.back.trim() : '';
          if (!isValidCardId(id) || !front || !back) {
            return;
          }
          cards.push({
            id: id,
            front: front,
            back: back,
            key: path + '::' + id
          });
        });

        return {
          title: title,
          path: path,
          cards: cards
        };
      }

      async function discoverDeckFiles() {
        const queue = [CONFIG.decksRoot];
        const results = [];

        while (queue.length) {
          const currentPath = queue.shift();
          const payload = await getContents(currentPath);
          if (!Array.isArray(payload)) {
            continue;
          }
          payload.forEach(function(entry) {
            if (!entry || typeof entry !== 'object') {
              return;
            }
            if (entry.type === 'dir') {
              queue.push(entry.path);
            } else if (entry.type === 'file' && /\.json$/i.test(entry.name)) {
              results.push({
                path: entry.path,
                name: entry.name
              });
            }
          });
        }

        results.sort(function(a, b) {
          return a.path.localeCompare(b.path);
        });
        return results;
      }

      async function loadAllDecks(deckFiles) {
        const decks = [];
        for (let i = 0; i < deckFiles.length; i += 1) {
          const file = deckFiles[i];
          const payload = await getJsonFile(file.path);
          const deck = normalizeDeckPayload(file.path, payload);
          if (deck.cards.length) {
            decks.push(deck);
          }
        }
        return decks;
      }

      function computeCounts() {
        let totalCards = 0;
        state.decks.forEach(function(deck) {
          totalCards += deck.cards.length;
        });
        return {
          decks: state.decks.length,
          cards: totalCards
        };
      }

      function refreshHomeButton() {
        const counts = computeCounts();
        const deckLabel = counts.decks + (counts.decks === 1 ? ' deck' : ' decks');
        const cardLabel = counts.cards + (counts.cards === 1 ? ' card' : ' cards');
        deckButtonSubtext.textContent = deckLabel + ' • ' + cardLabel;
        setUiEnabled(true);
      }

      function shuffleArray(items) {
        const copy = items.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const temp = copy[i];
          copy[i] = copy[j];
          copy[j] = temp;
        }
        return copy;
      }

      function currentSessionItem() {
        if (!state.study.sessionCards.length) {
          return null;
        }
        return state.study.sessionCards[state.study.index] || null;
      }

      function renderStudyCard() {
        const item = currentSessionItem();
        if (!item) {
          switchPage('home');
          return;
        }
        sessionTitle.textContent = state.study.title;
        sessionCounter.textContent = (state.study.index + 1) + ' / ' + state.study.sessionCards.length;
        cardDeckName.textContent = item.deckTitle;
        sideLabel.textContent = state.study.showingFront ? 'Front' : 'Back';
        cardText.textContent = state.study.showingFront ? item.card.front : item.card.back;
        prevButton.disabled = state.study.sessionCards.length <= 1;
        nextButton.disabled = state.study.sessionCards.length <= 1;
      }

      function render() {
        refreshHomeButton();
        if (state.activePage === 'study' && state.study.sessionCards.length) {
          renderStudyCard();
        }
      }

      function beginStudySession(title, items) {
        if (!state.connected) {
          openAuthModal('Login required.');
          return;
        }
        if (!items.length) {
          window.alert('No cards available for that session.');
          switchPage('home');
          return;
        }
        state.study.title = title;
        state.study.sessionCards = shuffleArray(items);
        state.study.index = 0;
        state.study.showingFront = true;
        switchPage('study');
        renderStudyCard();
      }

      function startSelectedDecks(paths) {
        const selected = state.decks.filter(function(deck) {
          return paths.indexOf(deck.path) >= 0;
        });
        const items = [];
        selected.forEach(function(deck) {
          deck.cards.forEach(function(card) {
            items.push({
              key: card.key,
              deckPath: deck.path,
              deckTitle: deck.title,
              card: card
            });
          });
        });
        beginStudySession(selected.length === 1 ? selected[0].title : 'Selected Decks', items);
      }

      function moveSession(delta) {
        if (!state.study.sessionCards.length) {
          return;
        }
        const total = state.study.sessionCards.length;
        state.study.index = (state.study.index + delta + total) % total;
        state.study.showingFront = true;
        renderStudyCard();
      }

      function flipCard() {
        if (!currentSessionItem()) {
          return;
        }
        state.study.showingFront = !state.study.showingFront;
        renderStudyCard();
      }

      function nextAction() {
        moveSession(1);
        render();
      }

      function prevAction() {
        moveSession(-1);
        render();
      }

      function suppressGhostClick() {
        state.suppressNextClick = true;
        if (state.suppressClickTimer) {
          window.clearTimeout(state.suppressClickTimer);
        }
        state.suppressClickTimer = window.setTimeout(function() {
          state.suppressNextClick = false;
          state.suppressClickTimer = null;
        }, 450);
      }

      function resetConnectionState() {
        state.connected = false;
        state.decks = [];
        state.study = {
          title: '',
          sessionCards: [],
          index: 0,
          showingFront: true
        };
        switchPage('home');
      }

      async function connectRepo() {
        const pat = patInput.value.trim();
        if (!pat) {
          setAuthError('GitHub PAT is required.');
          return;
        }

        state.pat = pat;
        persistPatPreference();
        resetConnectionState();
        setStatus('Connecting…', 'warning');
        setUiEnabled(false);
        connectButton.disabled = true;
        authCancelButton.disabled = true;
        setAuthError('');

        try {
          const deckFiles = await discoverDeckFiles();
          state.decks = await loadAllDecks(deckFiles);
          state.connected = true;
          setStatus('Connected • read-only', 'success');
          closeAuthModal();
          switchPage('home');
          render();
        } catch (error) {
          resetConnectionState();
          setStatus('Not connected', 'error');
          setAuthError(error && error.message ? error.message : 'Could not connect.');
          openAuthModal(error && error.message ? error.message : 'Could not connect.');
        } finally {
          connectButton.disabled = false;
          authCancelButton.disabled = false;
          setUiEnabled(true);
        }
      }

      function tryAutoConnect() {
        loadPreferences();
        if (rememberPatCheck.checked && patInput.value.trim()) {
          connectRepo();
        } else {
          openAuthModal('');
        }
      }

      statusButton.addEventListener('click', function() {
        openAuthModal('');
      });

      homeButton.addEventListener('click', function() {
        switchPage('home');
        render();
      });

      studyDeckButton.addEventListener('click', function() {
        openDeckModal();
      });

      connectButton.addEventListener('click', connectRepo);
      authCancelButton.addEventListener('click', function() {
        closeAuthModal();
      });

      deckCancelButton.addEventListener('click', function() {
        closeDeckModal();
      });

      deckStartButton.addEventListener('click', function() {
        const selected = Array.from(deckList.querySelectorAll('input[type="checkbox"]:checked')).map(function(input) {
          return input.value;
        });
        if (!selected.length) {
          setDeckError('Choose at least one deck.');
          return;
        }
        closeDeckModal();
        startSelectedDecks(selected);
      });

      prevButton.addEventListener('click', prevAction);
      nextButton.addEventListener('click', nextAction);
      flipButton.addEventListener('click', flipCard);

      cardButton.addEventListener('click', function() {
        if (state.suppressNextClick) {
          state.suppressNextClick = false;
          if (state.suppressClickTimer) {
            window.clearTimeout(state.suppressClickTimer);
            state.suppressClickTimer = null;
          }
          return;
        }
        flipCard();
      });

      cardButton.addEventListener('touchstart', function(event) {
        if (!currentSessionItem()) {
          return;
        }
        const touch = event.changedTouches[0];
        state.touchStartX = touch.clientX;
        state.touchStartY = touch.clientY;
      }, { passive: true });

      cardButton.addEventListener('touchend', function(event) {
        if (state.touchStartX === null || state.touchStartY === null) {
          return;
        }
        const touch = event.changedTouches[0];
        const deltaX = touch.clientX - state.touchStartX;
        const deltaY = touch.clientY - state.touchStartY;
        state.touchStartX = null;
        state.touchStartY = null;

        const absX = Math.abs(deltaX);
        const absY = Math.abs(deltaY);
        const isSwipe = absX >= 50 && absX >= absY * 1.2;
        const isTap = absX <= 12 && absY <= 12;

        if (isSwipe) {
          suppressGhostClick();
          if (deltaX < 0) {
            nextAction();
          } else {
            prevAction();
          }
          return;
        }

        if (isTap) {
          suppressGhostClick();
          flipCard();
        }
      }, { passive: true });

      cardButton.addEventListener('touchcancel', function() {
        state.touchStartX = null;
        state.touchStartY = null;
        state.suppressNextClick = false;
        if (state.suppressClickTimer) {
          window.clearTimeout(state.suppressClickTimer);
          state.suppressClickTimer = null;
        }
      }, { passive: true });

      document.addEventListener('keydown', function(event) {
        if (authModal.classList.contains('visible')) {
          if (event.key === 'Escape' && state.connected) {
            closeAuthModal();
          }
          return;
        }
        if (deckModal.classList.contains('visible')) {
          if (event.key === 'Escape') {
            closeDeckModal();
          }
          return;
        }
        if (state.activePage !== 'study' || !currentSessionItem()) {
          return;
        }
        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          prevAction();
        } else if (event.key === 'ArrowRight') {
          event.preventDefault();
          nextAction();
        } else if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          flipCard();
        }
      });

      rememberPatCheck.addEventListener('change', function() {
        persistPatPreference();
      });

      patInput.addEventListener('input', function() {
        if (rememberPatCheck.checked) {
          persistPatPreference();
        }
      });

      setStatus('Not connected', '');
      switchPage('home');
      render();
      tryAutoConnect();
    }());
  </script>
</body>
</html>
